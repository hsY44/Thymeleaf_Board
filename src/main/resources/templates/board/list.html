<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::head-extra}, ~{::scripts})}">
<head>
    <title>게시판</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">자유게시판</h5>
        <a th:href="@{/board/write}" class="btn btn-primary btn-sm">
            <i class="bi bi-pencil-square me-1"></i>글쓰기
        </a>
    </div>

    <!-- 검색 폼 -->
    <form class="row g-2 mb-3" th:action="@{/board}" method="get">
        <div class="col-auto">
            <select name="searchType" class="form-select form-select-sm">
                <option value="title">제목</option>
                <option value="content">내용</option>
                <option value="all">제목+내용</option>
            </select>
        </div>
        <div class="col">
            <input type="text" name="keyword" class="form-control form-control-sm" placeholder="검색어를 입력하세요">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </form>

    <!-- 게시글 목록 테이블 -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover board-table mb-0">
                <thead>
                    <tr class="text-center">
                        <th style="width: 70px;">번호</th>
                        <th>제목</th>
                        <th style="width: 100px;">작성자</th>
                        <th style="width: 110px;">작성일</th>
                        <th style="width: 70px;">조회</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 데이터 없을 때 -->
                    <tr>
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                            등록된 게시글이 없습니다.
                        </td>
                    </tr>
                    <!-- 게시글 목록 (서비스 연동 후 th:each 로 대체) -->
                    <!--
                    <tr th:each="post : ${posts}">
                        <td class="text-center" th:text="${post.id}"></td>
                        <td class="title-cell">
                            <a th:href="@{/board/{id}(id=${post.id})}" th:text="${post.title}"></a>
                        </td>
                        <td class="text-center" th:text="${post.nickname}"></td>
                        <td class="text-center" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></td>
                        <td class="text-center" th:text="${post.viewCount}"></td>
                    </tr>
                    -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav class="mt-3 d-flex justify-content-center">
        <ul class="pagination pagination-sm">
            <li class="page-item disabled">
                <a class="page-link" href="#">&laquo;</a>
            </li>
            <li class="page-item active">
                <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">2</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">3</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">&raquo;</a>
            </li>
        </ul>
    </nav>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
