<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::head-extra}, ~{::scripts})}">
<head>
    <title>게시글 상세</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <!-- 게시글 본문 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
            <h5 class="mb-1 fw-bold">게시글 제목이 여기 표시됩니다</h5>
            <div class="d-flex gap-3 text-muted" style="font-size: 0.82rem;">
                <span><i class="bi bi-person me-1"></i>작성자닉네임</span>
                <span><i class="bi bi-calendar3 me-1"></i>2026-06-30</span>
                <span><i class="bi bi-eye me-1"></i>조회 0</span>
            </div>
        </div>
        <div class="card-body">
            <div class="post-content">게시글 내용이 여기 표시됩니다.</div>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between">
            <a th:href="@{/board}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-list me-1"></i>목록
            </a>
            <!-- 본인/관리자만 표시 (서비스 연동 후 조건 처리) -->
            <div class="d-flex gap-2">
                <a th:href="@{/board/1/edit}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil me-1"></i>수정
                </a>
                <form th:action="@{/board/1/delete}" method="post" onsubmit="return confirm('삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash me-1"></i>삭제
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 댓글 영역 -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <span class="fw-bold">댓글 <span class="text-primary">0</span></span>
        </div>
        <div class="card-body">

            <!-- 댓글 목록 -->
            <div class="mb-3">
                <!-- 댓글 없을 때 -->
                <p class="text-muted text-center py-3" style="font-size: 0.9rem;">
                    첫 번째 댓글을 작성해보세요.
                </p>
                <!-- 댓글 아이템 (서비스 연동 후 th:each 로 대체) -->
                <!--
                <div class="comment-item mb-3" th:each="comment : ${comments}">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-semibold" style="font-size:0.85rem;" th:text="${comment.nickname}"></span>
                        <div class="d-flex align-items-center gap-2">
                            <span class="text-muted" style="font-size:0.78rem;" th:text="${#temporals.format(comment.createdAt,'yyyy-MM-dd HH:mm')}"></span>
                            <form th:action="@{/comment/{id}/delete(id=${comment.id})}" method="post">
                                <button type="submit" class="btn btn-link btn-sm text-danger p-0">삭제</button>
                            </form>
                        </div>
                    </div>
                    <p class="mb-0" style="font-size:0.9rem;" th:text="${comment.content}"></p>
                </div>
                -->
            </div>

            <!-- 댓글 작성 폼 (로그인 사용자만 표시 — 서비스 연동 후 조건 처리) -->
            <form th:action="@{/board/1/comment}" method="post" class="mt-3">
                <div class="mb-2">
                    <textarea name="content" class="form-control" rows="3"
                              placeholder="댓글을 입력하세요 (최대 1000자)" maxlength="1000"></textarea>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-chat-dots me-1"></i>댓글 등록
                    </button>
                </div>
            </form>

            <!-- 비로그인 안내 (서비스 연동 후 조건 처리) -->
            <!--
            <div class="alert alert-light text-center mt-3" style="font-size:0.9rem;">
                <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
            </div>
            -->

        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
