<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::head-extra}, ~{::scripts})}">
<head>
    <title>게시글 작성</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0 fw-bold">게시글 작성</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/board/write}" method="post">

                <!-- 제목 -->
                <div class="mb-3">
                    <label for="postTitle" class="form-label fw-semibold">제목</label>
                    <input type="text" id="postTitle" name="title"
                           class="form-control" placeholder="제목을 입력하세요" maxlength="200" required>
                </div>

                <!-- 내용 -->
                <div class="mb-2">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="postContent" class="form-label fw-semibold mb-0">내용</label>
                        <!-- Gemini 문법 검사 버튼 -->
                        <button type="button" id="geminiCheckBtn" class="btn btn-outline-success btn-sm gemini-btn">
                            <span id="geminiSpinner" class="spinner-border spinner-border-sm me-1"
                                  role="status" style="display:none;"></span>
                            <i class="bi bi-magic me-1"></i>문법·맞춤법 검사
                        </button>
                    </div>
                    <textarea id="postContent" name="content" class="form-control"
                              rows="15" placeholder="내용을 입력하세요"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a th:href="@{/board}" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check2 me-1"></i>등록
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Gemini 결과 모달 -->
    <div class="modal fade" id="geminiModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="geminiModalTitle">문법·맞춤법 검사 결과</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="geminiModalBody" style="white-space: pre-wrap; font-size: 0.9rem;">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts">
    <script th:src="@{/js/gemini.js}"></script>
</th:block>
</body>
</html>
