<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::head-extra}, ~{::scripts})}">
<head>
    <title>로그인</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-center">로그인</h5>

                    <!-- 에러 메시지 -->
                    <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:0.875rem;">
                        <i class="bi bi-exclamation-circle me-1"></i>이메일 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.locked}" class="alert alert-warning py-2" style="font-size:0.875rem;">
                        <i class="bi bi-lock me-1"></i>로그인 시도가 너무 많습니다. 15분 후 다시 시도해주세요.
                    </div>
                    <div th:if="${param.expired}" class="alert alert-info py-2" style="font-size:0.875rem;">
                        <i class="bi bi-info-circle me-1"></i>다른 기기에서 로그인하여 세션이 만료되었습니다.
                    </div>

                    <form th:action="@{/member/login}" method="post">

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">이메일</label>
                            <input type="email" id="email" name="email"
                                   class="form-control" placeholder="이메일을 입력하세요" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">비밀번호</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="비밀번호를 입력하세요" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                        </button>
                    </form>

                    <hr class="my-3">

                    <p class="text-center text-muted mb-0" style="font-size:0.875rem;">
                        계정이 없으신가요?
                        <a th:href="@{/member/join}" class="text-decoration-none">회원가입</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
